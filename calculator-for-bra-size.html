<!DOCTYPE html>
<html lang="en">
<head>
<!-- SEO Title -->
<title>Bra Size Calculator – Find Your Perfect Fit Easily</title>

<!-- Meta Description -->
<meta name="description" content="Use our free bra size calculator to measure bra size accurately. Find your bra size instantly with our easy bra measurement calculator.">

<!-- Keywords Tag -->
<meta name="keywords" content="
bra size calculator,
bra size calculator usa,
measure bra size,
find my bra size,
find your bra size,
bra measurement calculator,
how to measure bra size,
bra size chart,
correct bra size calculator,
bra fitting guide,
calculate bra size at home,
cup size calculator,
band size measurement,
bra size guide women,
accurate bra size calculator,
online bra size tool
">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bra Size Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff0f3; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 100%; text-align: center; }
        h2 { color: #d63384; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 2px solid #ffccd5; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #d63384; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #a32462; }
        #result-area { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background-color: #f8f9fa; }
        .size-text { font-size: 2rem; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bra Size Finder</h2>
    
    <div class="input-group">
        <label>1. Underbust (Snug, in inches)</label>
        <input type="number" id="underbust" placeholder="e.g. 30">
    </div>

    <div class="input-group">
        <label>2. Full Bust (Widest part, in inches)</label>
        <input type="number" id="bust" placeholder="e.g. 34">
    </div>

    <button onclick="calculateBraSize()">Find My Size</button>

    <div id="result-area">
        <p>Your estimated size is:</p>
        <div id="size-result" class="size-text"></div>
        <p style="font-size: 0.8rem; color: #777; margin-top: 10px;">
            Note: Sizes vary by brand. Use this as a starting point.
        </p>
    </div>
</div>

<script>
    function calculateBraSize() {
        const underbust = parseFloat(document.getElementById('underbust').value);
        const bust = parseFloat(document.getElementById('bust').value);
        
        if (!underbust || !bust || bust <= underbust) {
            alert("Please enter valid measurements. Bust must be larger than underbust.");
            return;
        }

        // 1. Calculate Band Size
        // Round the underbust to the nearest even number
        let bandSize = Math.round(underbust);
        if (bandSize % 2 !== 0) bandSize += 1;

        // 2. Calculate Cup Size
        // Difference between bust and band size
        const diff = Math.round(bust - bandSize);
        
        const cupMap = ["AA", "A", "B", "C", "D", "DD/E", "DDD/F", "G", "H", "I", "J"];
        let cupSize = "Unknown";
        
        if (diff >= 0 && diff < cupMap.length) {
            cupSize = cupMap[diff];
        } else if (diff >= cupMap.length) {
            cupSize = "K+";
        } else {
            cupSize = "AA"; // Default if very small difference
        }

        // Display Result
        const resultArea = document.getElementById('result-area');
        const sizeResult = document.getElementById('size-result');
        
        sizeResult.innerText = `${bandSize}${cupSize}`;
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>
