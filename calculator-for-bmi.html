<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator | Imperial and Metric</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #10b981; color: #10b981; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans p-4">

    <div class="max-w-md mx-auto mt-12 bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">BMI Calculator</h1>
            <p class="text-slate-400 text-sm mt-1">Check your Body Mass Index quickly</p>
        </div>

        <div class="p-6">
            <div class="flex mb-8 cursor-pointer text-center font-bold border-b border-slate-100">
                <div id="imperialTab" onclick="setUnits('imperial')" class="flex-1 pb-3 active-tab transition-all">Imperial (lbs/in)</div>
                <div id="metricTab" onclick="setUnits('metric')" class="flex-1 pb-3 transition-all">Metric (kg/cm)</div>
            </div>

            <div class="space-y-5">
                <div>
                    <label id="weightLabel" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Weight (lbs)</label>
                    <input type="number" id="weight" placeholder="Enter weight" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                </div>

                <div>
                    <label id="heightLabel" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Height (inches)</label>
                    <input type="number" id="height" placeholder="Enter height in inches" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                    <p id="heightNote" class="text-[10px] text-slate-400 mt-1 italic, font-bold">Note: 5'8" is 68 inches, 6'0" is 72 inches.</p>
                </div>

                <button onclick="calculateBMI()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-200 transition-all active:scale-95">
                    Calculate Now
                </button>
            </div>

            <div id="resultBox" class="mt-8 p-6 rounded-2xl hidden text-center border">
                <p class="text-sm uppercase tracking-widest text-slate-500">Your Result</p>
                <div id="bmiValue" class="text-4xl font-black my-2">0</div>
                <div id="bmiCategory" class="inline-block px-4 py-1 rounded-full text-sm font-bold uppercase tracking-tighter"></div>
            </div>
        </div>
        
        <div class="bg-slate-50 p-4 border-t border-slate-100 text-center">
            <span class="text-slate-400 text-[10px] font-medium">POWERED BY CRITICALCALCULATOR</span>
        </div>
    </div>

    <script>
        let currentUnit = 'imperial';

        function setUnits(unit) {
            currentUnit = unit;
            const wLabel = document.getElementById('weightLabel');
            const hLabel = document.getElementById('heightLabel');
            const hNote = document.getElementById('heightNote');
            const mTab = document.getElementById('metricTab');
            const iTab = document.getElementById('imperialTab');

            if (unit === 'imperial') {
                wLabel.innerText = "Weight (lbs)";
                hLabel.innerText = "Height (inches)";
                hNote.classList.remove('hidden');
                iTab.classList.add('active-tab');
                mTab.classList.remove('active-tab');
            } else {
                wLabel.innerText = "Weight (kg)";
                hLabel.innerText = "Height (cm)";
                hNote.classList.add('hidden');
                mTab.classList.add('active-tab');
                iTab.classList.remove('active-tab');
            }
            clearResults();
        }

        function clearResults() {
            document.getElementById('weight').value = '';
            document.getElementById('height').value = '';
            document.getElementById('resultBox').classList.add('hidden');
        }

        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const resultBox = document.getElementById('resultBox');
            const bmiValue = document.getElementById('bmiValue');
            const bmiCategory = document.getElementById('bmiCategory');

            if (!weight || !height || weight <= 0 || height <= 0) {
                alert("Please enter valid weight and height values.");
                return;
            }

            let bmi;
            if (currentUnit === 'imperial') {
                // Formula: 703 * (lbs / inches^2)
                bmi = (weight / (height * height)) * 703;
            } else {
                // Formula: kg / meters^2
                bmi = weight / ((height / 100) * (height / 100));
            }

            const score = bmi.toFixed(1);
            bmiValue.innerText = score;
            resultBox.classList.remove('hidden');

            let cat = "";
            let styles = "";

            if (score < 18.5) {
                cat = "Underweight";
                styles = "bg-blue-100 text-blue-700 border-blue-200";
            } else if (score >= 18.5 && score <= 24.9) {
                cat = "Healthy";
                styles = "bg-emerald-100 text-emerald-700 border-emerald-200";
            } else if (score >= 25 && score <= 29.9) {
                cat = "Overweight";
                styles = "bg-orange-100 text-orange-700 border-orange-200";
            } else {
                cat = "Obese";
                styles = "bg-red-100 text-red-700 border-red-200";
            }

            resultBox.className = `mt-8 p-6 rounded-2xl text-center border-2 ${styles}`;
            bmiCategory.innerText = cat;
        }
    </script>
</body>
</html>
