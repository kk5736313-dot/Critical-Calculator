<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Critical Calculator – Free Online Calculators</title>
    <meta name="description" content="All-in-one calculator hub for mortgage, fractions, and lifestyle.">
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background: #fff; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            z-index: 10000; background: #fff; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 2px solid #000;
            box-sizing: border-box;
        }
        .brand-group { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        #site-logo { height: 35px; width: auto; }
        .brand-text { font-weight: 900; font-size: 1.1rem; color: #000; text-transform: uppercase; }

        .dropbtn { 
            background: #000; color: #fff; border: none; 
            padding: 8px 14px; font-weight: 800; cursor: pointer; 
            font-size: 0.7rem; text-transform: uppercase; border-radius: 4px;
        }
        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 115%;
            background-color: #fff; width: 250px; border: 2px solid #000; 
            z-index: 10001; box-shadow: 6px 6px 0px #000;
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a {
            color: black; padding: 14px 18px; text-decoration: none; 
            display: block; font-weight: 700; border-bottom: 1px solid #f0f0f0;
        }

        #main-wrapper { margin-top: 60px; flex: 1; padding: 40px 20px; }
        .hero-text { font-size: 3.5rem; line-height: 0.85; font-weight: 900; margin-bottom: 40px; }
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 900px; }
        .tool-card { 
            border: 2px solid #000; padding: 30px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s; text-decoration: none; color: #000;
        }
        .tool-card:hover { background: #000; color: #fff; }
        .tool-card h2 { margin: 0; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }

        footer { height: 70px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }

        @media (min-width: 768px) {
            header { height: 80px; padding: 0 5%; }
            #main-wrapper { margin-top: 80px; }
            .hero-text { font-size: 6rem; }
            .card-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand-group">
            <img src="logo.png" alt="Logo" id="site-logo">
            <span class="brand-text">CRITICALCALCULATOR</span>
        </a>
        <nav>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event)">TOOLS ▾</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="calculator-for-bra-size.html">👙 Bra Size Finder</a>
                    <a href="a-calculator-for-fractions.html">➗ Fraction Logic</a>
                    <a href="every-state-living-cost-calculator.html">📍 State Living Cost</a>
                    <a href="income-needed-for-300k-mortgage.html">🏠 Mortgage Income</a>
                </div>
            </div>
        </nav>
    </header>

    <div id="main-wrapper">
        <div class="hero-text">CORE<br>UTILITIES.</div>
        <div class="card-grid">
            <a href="calculator-for-bra-size.html" class="tool-card"><h2>👙 BRA SIZE FINDER</h2><span>→</span></a>
            <a href="a-calculator-for-fractions.html" class="tool-card"><h2>➗ FRACTION LOGIC</h2><span>→</span></a>
            <a href="every-state-living-cost-calculator.html" class="tool-card"><h2>📍 STATE LIVING COST</h2><span>→</span></a>
            <a href="income-needed-for-300k-mortgage.html" class="tool-card"><h2>🏠 MORTGAGE INCOME</h2><span>→</span></a>
        </div>
    </div>

    <footer>© 2026 CRITICAL CALCULATOR</footer>

    <script>
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('myDropdown').classList.toggle("show");
        }
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                document.getElementById('myDropdown').classList.remove("show");
            }
        }
    </script>
</body>
</html>
