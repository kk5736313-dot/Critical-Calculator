<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Critical Calculator – Free Online Calculators: Mortgage, Fractions, BMI & Cost of Living</title>
  <meta name="description" content="Critical Calculator: Free tools for mortgage affordability, fractions, bra size, BMI, and cost of living by state. Instant results.">
  <meta name="keywords" content="critical calculator, mortgage calculator, fraction calculator, bra size calculator, BMI calculator, cost of living calculator, every state cost of living, income needed for 300k mortgage">
  <meta name="author" content="Critical Calculator">
  <meta name="robots" content="index, follow">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #000000;
      line-height: 1.4;
    }

    /* ===== HEADER (exactly as criticalcalculator.online) ===== */
    .site-header {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 2px solid #000000;
      z-index: 1000;
      padding: 0 5%;
    }

    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 70px;
      flex-wrap: wrap;
    }

    /* brand group: logo image + text */
    .brand-group {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      display: block;
    }

    .brand-text {
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    /* DROPDOWN MENU WITH WORKING SCROLLER */
    .dropdown {
      position: relative;
    }

    .dropbtn {
      background: #000000;
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 115%;
      background: #ffffff;
      width: 260px;
      border: 2px solid #000000;
      z-index: 1001;
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.1);
      /* SCROLLER: limited height + overflow auto */
      max-height: 280px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* custom scrollbar for better visibility */
    .dropdown-content::-webkit-scrollbar {
      width: 8px;
    }
    .dropdown-content::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .dropdown-content::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
    .dropdown-content::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .dropdown-content a {
      color: #000000;
      padding: 12px 18px;
      text-decoration: none;
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      border-bottom: 1px solid #eeeeee;
      cursor: pointer;
      transition: 0.1s;
    }

    .dropdown-content a:hover {
      background: #000000;
      color: #ffffff;
    }

    .show {
      display: block;
    }

    /* ===== MAIN LAYOUT (landing page) ===== */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* hero text "CORE UTILITIES." */
    .hero-text {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 0.9;
      margin-bottom: 2.5rem;
      letter-spacing: -2px;
    }

    /* responsive tool grid */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    /* card style */
    .tool-card {
      border: 2px solid #000000;
      padding: 1.8rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
      background: #ffffff;
    }

    .tool-card:hover {
      background: #000000;
      color: #ffffff;
    }

    .tool-card h3 {
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -0.3px;
    }

    .tool-card span {
      font-size: 1.4rem;
      font-weight: 600;
    }

    /* hidden class for views */
    .hidden {
      display: none !important;
    }

    /* iframe container (no back button) */
    .iframe-viewport {
      margin-top: 1rem;
      width: 100%;
    }

    .tool-iframe {
      width: 100%;
      min-height: 700px;
      height: calc(100vh - 140px);
      border: 1px solid #e2e8f0;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    /* footer */
    .site-footer {
      background: #000000;
      color: #ffffff;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-top: 2rem;
    }

    /* ===== MOBILE FRIENDLY TWEAKS ===== */
    @media (max-width: 700px) {
      .header-container {
        flex-direction: column;
        gap: 10px;
        padding: 12px 0;
      }
      .tool-card {
        padding: 1.2rem;
      }
      .tool-iframe {
        min-height: 550px;
        height: 70vh;
      }
      .brand-logo {
        height: 32px;
      }
      .brand-text {
        font-size: 1rem;
      }
      .dropdown-content {
        width: 240px;
        max-height: 260px;
        right: -10px;
      }
      .hero-text {
        margin-bottom: 1.5rem;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-container">
    <div class="brand-group" id="homeBtn">
      <img src="logo.png" alt="Critical Calculator Logo" class="brand-logo" id="siteLogo">
      <span class="brand-text">CRITICALCALCULATOR</span>
    </div>
    <div class="dropdown">
      <button class="dropbtn" id="menuBtn">TOOLS ▾</button>
      <div id="dropdownMenu" class="dropdown-content">
        <a data-tool="bra">👙 Bra Size Finder</a>
        <a data-tool="fraction">➗ Fraction Logic</a>
        <a data-tool="bmi">⚖️ BMI Calculator</a>
        <a data-tool="living">📍 State Living Cost</a>
        <a data-tool="mortgage">🏠 Mortgage Income</a>
        <!-- extra item to force scroll (already 5 items, but adding one more ensures scroll) -->
        <a data-tool="mortgage" style="opacity:0.9;">📊 Budget Planner (soon)</a>
      </div>
    </div>
  </div>
</header>

<div class="main-container" id="appContainer">
  <!-- LANDING VIEW -->
  <div id="landingView">
    <div class="hero-text">CORE<br>UTILITIES.</div>
    <div class="tool-grid" id="toolGrid">
      <div class="tool-card" data-tool="bra"><h3>👙 BRA SIZE FINDER</h3><span>→</span></div>
      <div class="tool-card" data-tool="fraction"><h3>➗ FRACTION LOGIC</h3><span>→</span></div>
      <div class="tool-card" data-tool="bmi"><h3>⚖️ BMI CALCULATOR</h3><span>→</span></div>
      <div class="tool-card" data-tool="living"><h3>📍 STATE LIVING COST</h3><span>→</span></div>
      <div class="tool-card" data-tool="mortgage"><h3>🏠 MORTGAGE INCOME</h3><span>→</span></div>
    </div>
  </div>

  <!-- IFRAME VIEW (NO BACK BUTTON) -->
  <div id="iframeView" class="hidden">
    <div class="iframe-viewport">
      <iframe id="toolFrame" class="tool-iframe" title="Calculator tool" src="about:blank"></iframe>
    </div>
  </div>
</div>

<footer class="site-footer">
  POWERED BY CRITICALCALCULATOR — © 2026
</footer>

<script>
  // MAPPING: tool IDs → actual file names (must match uploaded files)
  const toolFileMap = {
    bra: "calculator for bra size.html",
    fraction: "a calculator for fractions.html",
    bmi: "calculator-for-bmi.html",
    living: "every-state-living-cost-calculator.html",
    mortgage: "income needed for 300k mortgage.html"
  };

  // clean slugs for sub-URLs
  function getSlugFromTool(toolId) {
    const slugs = {
      bra: "bra-size-calculator",
      fraction: "fraction-calculator",
      bmi: "bmi-calculator",
      living: "cost-of-living-calculator",
      mortgage: "mortgage-calculator"
    };
    return slugs[toolId] || toolId;
  }

  // update browser URL (sub-url appears in search bar)
  function updateSubUrl(toolId) {
    const slug = getSlugFromTool(toolId);
    let basePath = window.location.pathname.replace(/\/[^\/]*\/?$/, '');
    if (!basePath.endsWith('/') && basePath !== '') basePath += '/';
    const newUrl = window.location.origin + basePath + slug + "/";
    window.history.pushState({ toolId: toolId }, "", newUrl);
  }

  // load a calculator tool
  function loadTool(toolId) {
    if (!toolId || !toolFileMap[toolId]) {
      alert("Tool configuration error. Please ensure all HTML files are uploaded.");
      return;
    }
    const fileName = toolFileMap[toolId];
    const iframeView = document.getElementById("iframeView");
    const landingView = document.getElementById("landingView");
    const toolFrame = document.getElementById("toolFrame");

    landingView.classList.add("hidden");
    iframeView.classList.remove("hidden");
    toolFrame.src = fileName;

    updateSubUrl(toolId);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // go back to landing page (home)
  function goToLanding() {
    const landingView = document.getElementById("landingView");
    const iframeView = document.getElementById("iframeView");
    landingView.classList.remove("hidden");
    iframeView.classList.add("hidden");
    const toolFrame = document.getElementById("toolFrame");
    if (toolFrame) toolFrame.src = "about:blank";

    let cleanUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*\/?$/, '');
    if (!cleanUrl.endsWith('/')) cleanUrl += '/';
    window.history.pushState({}, document.title, cleanUrl);
  }

  // extract tool ID from sub-url
  function getToolIdFromPath() {
    const path = window.location.pathname;
    const cleanPath = path.replace(/\/$/, "");
    const lastSegment = cleanPath.split("/").pop();
    const reverseMap = {
      "bra-size-calculator": "bra",
      "fraction-calculator": "fraction",
      "bmi-calculator": "bmi",
      "cost-of-living-calculator": "living",
      "mortgage-calculator": "mortgage"
    };
    return reverseMap[lastSegment] || null;
  }

  // on load: check URL and load tool if needed
  function checkUrlAndLoadTool() {
    const toolId = getToolIdFromPath();
    if (toolId && toolFileMap[toolId]) {
      const landingView = document.getElementById("landingView");
      const iframeView = document.getElementById("iframeView");
      landingView.classList.add("hidden");
      iframeView.classList.remove("hidden");
      document.getElementById("toolFrame").src = toolFileMap[toolId];
    } else {
      goToLanding();
    }
  }

  // ---- EVENT LISTENERS ----
  // tool cards
  document.querySelectorAll(".tool-card").forEach(card => {
    card.addEventListener("click", () => {
      const tool = card.getAttribute("data-tool");
      if (tool && toolFileMap[tool]) loadTool(tool);
      else alert("Upload the corresponding HTML file.");
    });
  });

  // dropdown menu items
  document.querySelectorAll(".dropdown-content a").forEach(item => {
    item.addEventListener("click", (e) => {
      const tool = item.getAttribute("data-tool");
      if (tool && toolFileMap[tool]) loadTool(tool);
      else if (item.innerText.includes("Budget")) alert("Budget Planner coming soon!");
      else alert("Please upload the required HTML file.");
      document.getElementById("dropdownMenu").classList.remove("show");
    });
  });

  // home button
  document.getElementById("homeBtn").addEventListener("click", () => {
    goToLanding();
    document.getElementById("dropdownMenu").classList.remove("show");
  });

  // dropdown toggle
  const menuBtn = document.getElementById("menuBtn");
  const dropdownMenu = document.getElementById("dropdownMenu");
  menuBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    dropdownMenu.classList.toggle("show");
  });
  window.addEventListener("click", (e) => {
    if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
      dropdownMenu.classList.remove("show");
    }
  });

  // handle back/forward buttons
  window.addEventListener("popstate", (event) => {
    const toolId = getToolIdFromPath();
    if (toolId && toolFileMap[toolId]) {
      document.getElementById("landingView").classList.add("hidden");
      document.getElementById("iframeView").classList.remove("hidden");
      document.getElementById("toolFrame").src = toolFileMap[toolId];
    } else {
      goToLanding();
    }
  });

  // logo fallback if logo.png missing
  const logoImg = document.getElementById("siteLogo");
  if (logoImg) {
    logoImg.onerror = function() {
      this.style.display = "none";
      const brandGroup = document.querySelector(".brand-group");
      if (brandGroup && !brandGroup.querySelector(".fallback-icon")) {
        const fallback = document.createElement("span");
        fallback.className = "fallback-icon";
        fallback.style.fontSize = "28px";
        fallback.style.fontWeight = "bold";
        fallback.innerText = "⚡";
        brandGroup.insertBefore(fallback, brandGroup.firstChild);
      }
    };
  }

  checkUrlAndLoadTool();
</script>
</body>
</html>
