<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Critical Calculator</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* --- CORE SYSTEM --- */
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background: #fff; height: 100vh;
            overflow: hidden; /* Prevents double scrollbars */
            display: flex; flex-direction: column;
        }

        /* FIXED HEADER */
        header {
            height: 60px; background: #fff; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 2px solid #000;
            flex-shrink: 0; z-index: 10000;
        }

        .brand-group { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        #site-logo { height: 35px; }
        .brand-text { font-weight: 900; font-size: 1.1rem; color: #000; text-transform: uppercase; }

        /* DROPDOWN MENU WITH SCROLLER */
        .dropdown { position: relative; }
        .dropbtn { 
            background: #000; color: #fff; border: none; padding: 8px 14px; 
            font-weight: 800; cursor: pointer; border-radius: 4px; font-size: 0.7rem;
        }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 115%;
            background: #fff; width: 260px; border: 2px solid #000; 
            box-shadow: 6px 6px 0px #000; z-index: 10001;
            max-height: 400px; /* HEIGHT LIMIT */
            overflow-y: auto;  /* SCROLLER ENABLED */
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a {
            color: black; padding: 14px 18px; text-decoration: none; 
            display: block; font-weight: 700; border-bottom: 1px solid #eee;
        }
        .dropdown-content a:hover { background: #000; color: #fff; }

        /* VIEWPORT CONTAINER */
        #content-area { flex: 1; position: relative; overflow-y: auto; }
        
        iframe {
            width: 100%; height: 100%; border: none;
            display: none; /* Hidden until a tool is clicked */
        }

        #hub-view { padding: 40px 20px; }
        .hero-text { font-size: 3.5rem; line-height: 0.85; font-weight: 900; margin-bottom: 40px; }
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 900px; }
        .tool-card { 
            border: 2px solid #000; padding: 30px; display: flex; 
            justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .tool-card:hover { background: #000; color: #fff; }

        /* FIXED FOOTER */
        footer {
            height: 50px; background: #000; color: #fff; 
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; flex-shrink: 0;
        }

        @media (min-width: 768px) {
            header { height: 80px; }
            .hero-text { font-size: 6rem; }
            .card-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-group" onclick="openHub()">
            <img src="logo.png" id="site-logo">
            <span class="brand-text">CRITICALCALCULATOR</span>
        </div>
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleMenu(event)">TOOLS ▾</button>
            <div id="myDropdown" class="dropdown-content">
                <a href="javascript:void(0)" onclick="loadTool('calculator-for-bra-size.html')">👙 Bra Size Finder</a>
                <a href="javascript:void(0)" onclick="loadTool('calculator-for-fractions.html')">➗ Fraction Logic</a>
                <a href="javascript:void(0)" onclick="loadTool('every-state-living-cost-calculator.html')">📍 State Living Cost</a>
                <a href="javascript:void(0)" onclick="loadTool('income-needed-for-mortgage-calculator')">🏠 Mortgage Income</a>
                <a href="javascript:void(0)" onclick="loadTool('calculator-for-bmi.html')">⚖️ BMI Calculator</a>
            </div>
        </div>
    </header>

    <div id="content-area">
        <div id="hub-view">
            <div class="hero-text">CORE<br>UTILITIES.</div>
            <div class="card-grid">
                <div class="tool-card" onclick="loadTool('calculator for bra size.html')"><h2>👙 BRA SIZE FINDER</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('a calculator for fractions.html')"><h2>➗ FRACTION LOGIC</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('every-state-living-cost-calculator.html')"><h2>📍 STATE LIVING COST</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('income needed for 300k mortgage.html')"><h2>🏠 MORTGAGE INCOME</h2><span>→</span></a>
            </div>
        </div>

        <iframe id="tool-iframe"></iframe>
    </div>

    <footer>© 2026 CRITICAL CALCULATOR</footer>

    <script>
        const iframe = document.getElementById('tool-iframe');
        const hub = document.getElementById('hub-view');
        const dropdown = document.getElementById('myDropdown');

        function toggleMenu(e) {
            e.stopPropagation();
            dropdown.classList.toggle("show");
        }

        function loadTool(url) {
            dropdown.classList.remove("show");
            hub.style.display = "none";
            iframe.style.display = "block";
            iframe.src = url;
        }

        function openHub() {
            hub.style.display = "block";
            iframe.style.display = "none";
            iframe.src = "";
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                dropdown.classList.remove("show");
            }
        }
    </script>
</body>
</html>
