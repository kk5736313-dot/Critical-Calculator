<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Calculator</title>
    <style>
        /* MASTER STYLE - Centered & Fixed Layout */
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { position: fixed; top: 0; width: 100%; height: 70px; background: #fff; border-bottom: 2px solid #000; z-index: 10000; display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #000; font-weight: 900; text-transform: uppercase; }
        .brand img { height: 35px; }

        /* TOOL TAB SCROLLER FIXED */
        .dropdown { position: relative; }
        .dropbtn { background: #000; color: #fff; border: none; padding: 10px 16px; font-weight: 800; cursor: pointer; border-radius: 4px; }
        .dropdown-content { 
            display: none; position: absolute; right: 0; top: 110%; background: #fff; width: 260px; border: 2px solid #000; 
            box-shadow: 6px 6px 0px #000; z-index: 10001; 
            max-height: 200px; /* This forces the scroller after ~4 items */
            overflow-y: auto; 
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a { color: #000; padding: 12px 15px; text-decoration: none; display: block; font-weight: 700; border-bottom: 1px solid #eee; }
        .dropdown-content a:hover { background: #000; color: #fff; }

        /* CENTERED CONTENT */
        main { flex: 1; margin: 100px auto 100px auto; width: 100%; max-width: 1000px; padding: 0 20px; box-sizing: border-box; }
        .hero { font-size: 4rem; font-weight: 900; line-height: 0.9; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { border: 2px solid #000; padding: 30px; text-decoration: none; color: #000; display: flex; justify-content: space-between; align-items: center; font-weight: 900; }
        .card:hover { background: #000; color: #fff; }

        footer { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10000; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="brand"><img src="logo.png"><span>CRITICALCALCULATOR</span></a>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event)">TOOLS ▾</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="calculator-for-bra-size.html">👙 Bra Size Finder</a>
                    <a href="calculator-for-fractions.html">➗ Fraction Logic</a>
                    <a href="every-state-living-cost-calculator.html">📍 State Living Cost</a>
                    <a href="income-needed-mortgage-calculator.html">🏠 Mortgage Income</a>
                    <a href="calculator-for-bmi.html">⚖️ BMI Calculator</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="hero">CORE<br>UTILITIES.</div>
        <div class="grid">
            <a href="calculator-for-bra-size.html" class="card">BRA SIZE FINDER <span>→</span></a>
            <a href="calculator-for-fractions.html" class="card">FRACTION LOGIC <span>→</span></a>
            <a href="every-state-living-cost-calculator.html" class="card">STATE LIVING COST <span>→</span></a>
            <a href="income-needed-mortgage-calculator.html" class="card">MORTGAGE INCOME <span>→</span></a>
            <a href="calculator-for-bmi.html" class="card">BMI CALCULATOR <span>→</span></a>
        </div>
    </main>

    <footer>© 2026 CRITICAL CALCULATOR</footer>

    <script>
        function toggleMenu(e) { e.stopPropagation(); document.getElementById('myDropdown').classList.toggle("show"); }
        window.onclick = function() { document.getElementById('myDropdown').classList.remove("show"); }
    </script>
</body>
</html>
