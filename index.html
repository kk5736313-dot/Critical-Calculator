<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Critical Calculator</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fff; height: 100%; display: flex; flex-direction: column; }
        
        header { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 10000; background: #fff; border-bottom: 2px solid #000; display: flex; justify-content: center; }
        .header-container { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        
        .brand-group { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; color: #000; font-weight: 900; text-transform: uppercase; }
        #site-logo { height: 35px; }

        /* DROPDOWN WITH SCROLLER */
        .dropdown { position: relative; }
        .dropbtn { background: #000; color: #fff; border: none; padding: 8px 14px; font-weight: 800; cursor: pointer; font-size: 0.7rem; border-radius: 4px; }
        .dropdown-content { 
            display: none; position: absolute; right: 0; top: 115%; background: #fff; width: 250px; border: 2px solid #000; 
            z-index: 10001; box-shadow: 6px 6px 0px #000; 
            max-height: 220px; overflow-y: auto; 
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a { color: #000; padding: 14px 18px; text-decoration: none; display: block; font-weight: 700; border-bottom: 1px solid #f0f0f0; }

        /* CENTERED CONTENT */
        #main-wrapper { margin: 80px auto 60px auto; width: 100%; max-width: 1000px; padding: 0 20px; box-sizing: border-box; flex: 1; }
        .hero-text { font-size: 3.5rem; line-height: 0.85; font-weight: 900; margin-bottom: 40px; }
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .tool-card { border: 2px solid #000; padding: 30px; text-decoration: none; color: #000; display: flex; justify-content: space-between; align-items: center; font-weight: 900; }

        footer { width: 100%; height: 60px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        @media (min-width: 768px) { .hero-text { font-size: 6rem; } .card-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="index.html" class="brand-group" onclick="navigate(event)">
                <img src="logo.png" id="site-logo">
                <span class="brand-text">CRITICALCALCULATOR</span>
            </a>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event)">TOOLS ▾</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="calculator-for-bra-size.html" onclick="navigate(event)">👙 Bra Size Finder</a>
                    <a href="calculator-for-fractions.html" onclick="navigate(event)">➗ Fraction Logic</a>
                    <a href="every-state-living-cost-calculator.html" onclick="navigate(event)">📍 State Living Cost</a>
                    <a href="income-needed-mortgage-calculator.html" onclick="navigate(event)">🏠 Mortgage Income</a>
                    <a href="calculator-for-bmi.html" onclick="navigate(event)">⚖️ BMI Calculator</a>
                </div>
            </div>
        </div>
    </header>

    <div id="main-wrapper">
        <div id="content-area">
            <div class="hero-text">CORE<br>UTILITIES.</div>
            <div class="card-grid">
                <a href="calculator-for-bra-size.html" class="tool-card" onclick="navigate(event)">BRA SIZE FINDER <span>→</span></a>
                <a href="calculator-for-fractions.html" class="tool-card" onclick="navigate(event)">FRACTION LOGIC <span>→</span></a>
                <a href="every-state-living-cost-calculator.html" class="tool-card" onclick="navigate(event)">STATE LIVING COST <span>→</span></a>
                <a href="income-needed-mortgage-calculator.html" class="tool-card" onclick="navigate(event)">MORTGAGE INCOME <span>→</span></a>
            </div>
        </div>
    </div>

    <footer>© 2026 CRITICAL CALCULATOR</footer>

    <script>
        function toggleMenu(e) { e.stopPropagation(); document.getElementById('myDropdown').classList.toggle("show"); }

        async function navigate(e) {
            e.preventDefault();
            const url = e.currentTarget.getAttribute('href');
            
            // 1. UPDATE THE URL BAR (Like your screenshot)
            window.history.pushState({}, "", url);
            document.getElementById('myDropdown').classList.remove("show");

            if(url === 'index.html') { location.reload(); return; }

            // 2. FETCH THE TOOL CONTENT
            try {
                const response = await fetch(url);
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                
                // Get only the body of the target page
                const newContent = doc.querySelector('body').innerHTML;
                document.getElementById('content-area').innerHTML = newContent;
                window.scrollTo(0,0);
            } catch (err) {
                console.log("Error loading page, redirecting...");
                window.location.href = url; // Fallback
            }
        }

        // Handle back button
        window.onpopstate = () => location.reload();
        window.onclick = () => document.getElementById('myDropdown').classList.remove("show");
    </script>
</body>
</html>
