    <style>
        /* --- CORE SYSTEM --- */
        body, html {

        }

        .brand-group {

            align-items: center;

        .dropdown { position: relative; }

            padding: 8px 14px; font-weight: 800; cursor: pointer; 
            font-size: 0.7rem; text-transform: uppercase; border-radius: 4px;
        }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 115%;
            background-color: #fff; width: 250px; border: 2px solid #000; 
            z-index: 10001; box-shadow: 6px 6px 0px #000;
            max-height: 200px; overflow-y: auto; 
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a {

            display: block; font-weight: 700; font-size: 0.85rem;

            flex-direction: column;
        }

            border: 2px solid #000; padding: 30px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;

        .tool-card h2 { margin: 0; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; }

<body>

    <header>

    <div id="main-wrapper">
        <main id="hub-view">
            <div class="hero-text">CORE<br>UTILITIES.</div>

                <div class="tool-card" onclick="loadTool('calculator-for-bra-size.html')">

        <iframe id="tool-viewport" name="tool-viewport"></iframe>
    </div>
<script>
    const viewport = document.getElementById('tool-viewport');
    const hub = document.getElementById('hub-view');
    const dropdown = document.getElementById('myDropdown');

    function toggleMenu(e) {
        if (e) e.stopPropagation();
        dropdown.classList.toggle("show");
    }

    function closeMenu() {
        dropdown.classList.remove("show");
    }

    function loadTool(fileName) {
        closeMenu();
        hub.classList.add('hidden');
        viewport.style.display = "block";
        
        // FIX: Replaces iframe content without adding a "blank" step in history
        viewport.contentWindow.location.replace(fileName);
        
        // Updates the address bar with a Hash
        const cleanName = fileName.replace('.html', '');
        window.location.hash = '/' + cleanName;
        
        window.scrollTo(0, 0);
    }

    function openHub() {
        closeMenu();
        hub.classList.remove('hidden');
        viewport.style.display = "none";
        
        // FIX: Clears the iframe without adding an extra history step
        viewport.contentWindow.location.replace("about:blank");
        
        window.location.hash = '';
        window.scrollTo(0, 0);
    }

    // Handles page refresh and direct links
    window.addEventListener('load', function() {
        const currentHash = window.location.hash;
        if (currentHash && currentHash.includes('/')) {
            const toolName = currentHash.replace('#/', '') + '.html';
            loadTool(toolName);
        }
    });

    // Handles the browser "Back" button
    window.addEventListener('hashchange', function() {
        if (!window.location.hash || window.location.hash === '#') {
            openHub();
        }
    });

    window.onclick = function(event) {
        if (!event.target.matches('.dropbtn')) {
            closeMenu();
        }
    };
</script>
