<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRITICALCALCULATOR | Professional Suite</title>
    <style>
        /* 1. CORE SYSTEM */
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: #fff; height: 100%; display: flex; flex-direction: column; 
        }

        /* 2. HEADER - Centered Content */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 65px; 
            z-index: 10000; background: #fff; border-bottom: 2px solid #000;
            display: flex; justify-content: center;
        }
        .header-container {
            width: 100%; max-width: 1000px; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .brand-group { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; color: #000; }
        #site-logo { height: 35px; }
        .brand-text { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; }

        /* 3. TOOL TAB SCROLLER FIX */
        .dropdown { position: relative; }
        .dropbtn { 
            background: #000; color: #fff; border: none; padding: 8px 14px; 
            font-weight: 800; cursor: pointer; font-size: 0.7rem; border-radius: 4px;
        }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 115%;
            background-color: #fff; width: 250px; border: 2px solid #000; 
            z-index: 10001; box-shadow: 6px 6px 0px #000;
            max-height: 220px; /* Forces scroller after 4 items */
            overflow-y: auto; 
        }
        .dropdown-content.show { display: block; }
        .dropdown-content a {
            color: black; padding: 14px 18px; text-decoration: none; 
            display: block; font-weight: 700; border-bottom: 1px solid #f0f0f0;
        }
        .dropdown-content a:hover { background-color: #000; color: #fff; }

        /* 4. THE "BOX" (Iframe Container) */
        #main-wrapper {
            margin: 80px auto 20px auto; /* Centered with top spacing */
            width: 95%; max-width: 1000px; flex: 1;
            display: flex; flex-direction: column;
        }

        /* This is the box where the other pages live */
        #tool-viewport {
            width: 100%; height: 600px; /* Reduced size box */
            border: 2px solid #000; border-radius: 8px;
            display: none; background: #fff;
        }

        /* 5. HUB VIEW (Main Menu) */
        #hub-view { padding: 20px 0; }
        .hero-text { font-size: 3.5rem; line-height: 0.85; font-weight: 900; margin-bottom: 30px; }
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .tool-card { 
            border: 2px solid #000; padding: 25px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .tool-card:hover { background: #000; color: #fff; }
        .hidden { display: none !important; }

        /* 6. FOOTER */
        footer {
            width: 100%; height: 60px; background: #000; color: #fff; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        @media (min-width: 768px) {
            .hero-text { font-size: 5rem; }
            .card-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="brand-group" onclick="openHub()">
                <img src="logo.png" alt="Logo" id="site-logo">
                <span class="brand-text">CRITICALCALCULATOR</span>
            </div>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event)">TOOLS ▾</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="javascript:void(0);" onclick="loadTool('calculator for bra size.html')">👙 Bra Size Finder</a>
                    <a href="javascript:void(0);" onclick="loadTool('calculator-for-fractions.html')">➗ Fraction Logic</a>
                    <a href="javascript:void(0);" onclick="loadTool('every-state-living-cost-calculator.html')">📍 State Living Cost</a>
                    <a href="javascript:void(0);" onclick="loadTool('income-needed-mortgage-calculator.html')">🏠 Mortgage Income</a>
                    <a href="javascript:void(0);" onclick="loadTool('calculator-for-bmi.html')">⚖️ BMI Calculator</a>
                </div>
            </div>
        </div>
    </header>

    <div id="main-wrapper">
        <main id="hub-view">
            <div class="hero-text">CORE<br>UTILITIES.</div>
            <div class="card-grid">
                <div class="tool-card" onclick="loadTool('calculator for bra size.html')"><h2>👙 BRA SIZE FINDER</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('calculator-for-fractions.html')"><h2>➗ FRACTION LOGIC</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('every-state-living-cost-calculator.html')"><h2>📍 STATE LIVING COST</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('income-needed-mortgage-calculator.html')"><h2>🏠 MORTGAGE INCOME</h2><span>→</span></div>
                <div class="tool-card" onclick="loadTool('calculator-for-bmi.html')"><h2>⚖️ BMI CALCULATOR</h2><span>→</span></div>
            </div>
        </main>

        <iframe id="tool-viewport"></iframe>
    </div>

    <footer>POWERED BY CRITICALCALCULATOR — 2026</footer>

    <script>
        const viewport = document.getElementById('tool-viewport');
        const hub = document.getElementById('hub-view');
        const dropdown = document.getElementById('myDropdown');

        function toggleMenu(e) {
            e.stopPropagation();
            dropdown.classList.toggle("show");
        }

        function loadTool(fileName) {
            dropdown.classList.remove("show");
            hub.classList.add('hidden');
            viewport.style.display = "block";
            viewport.src = fileName; // Loads the file with its OWN css inside the box
            window.scrollTo(0, 0);
        }

        function openHub() {
            dropdown.classList.remove("show");
            hub.classList.remove('hidden');
            viewport.style.display = "none";
            viewport.src = "about:blank"; 
            window.scrollTo(0, 0);
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                dropdown.classList.remove("show");
            }
        }
    </script>
</body>
</html>
